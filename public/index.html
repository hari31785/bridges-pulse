<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridges Pulse - Advanced Health Monitor</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/feather-icons@4.29.0/dist/feather.min.css">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    
    <!-- Meta -->
    <meta name="description" content="Bridges Pulse - Advanced monitoring dashboard for Bridges applications with real-time status, reporting, and analytics.">
    <meta name="theme-color" content="#3b82f6">
</head>
<body class="theme-light">
    <!-- Loading Spinner -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner">
            <div class="pulse-loader">
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
            </div>
            <p>Loading Bridges Pulse...</p>
        </div>
    </div>
    
    <!-- Main App Container -->
    <div id="app" class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <!-- Inline SVG pulse icon — no CDN dependency -->
                    <div class="logo-icon">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                            <rect width="48" height="48" rx="12" fill="url(#logoGrad)"/>
                            <polyline points="4,24 10,24 14,14 18,34 22,20 26,28 30,24 34,24 38,18 42,24 44,24"
                                      stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                            <defs>
                                <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                                    <stop offset="0%" stop-color="#3b82f6"/>
                                    <stop offset="100%" stop-color="#8b5cf6"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1 id="dashboard-title">Bridges Pulse</h1>
                        <p id="dashboard-subtitle">Advanced Health Monitoring</p>
                    </div>
                </div>
            </div>

            <div class="header-center">
                <div class="status-summary" id="status-summary">
                    <div class="summary-item">
                        <span class="summary-count" id="healthy-count">0</span>
                        <span class="summary-label">Healthy</span>
                        <div class="summary-dot dot-green"></div>
                    </div>
                    <div class="summary-item">
                        <span class="summary-count" id="warning-count">0</span>
                        <span class="summary-label">Warnings</span>
                        <div class="summary-dot dot-yellow"></div>
                    </div>
                    <div class="summary-item">
                        <span class="summary-count" id="critical-count">0</span>
                        <span class="summary-label">Critical</span>
                        <div class="summary-dot dot-red"></div>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <div class="timestamp" id="timestamp">
                    <i data-feather="clock"></i>
                    <span id="current-time"></span>
                </div>

                <!-- Hamburger Menu -->
                <div class="menu-wrapper">
                    <button id="menu-toggle" class="hamburger-btn" title="Menu" aria-expanded="false" aria-haspopup="true">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>

                    <nav id="nav-menu" class="nav-menu" role="menu">
                        <button id="theme-toggle" class="nav-item" role="menuitem" title="Toggle theme">
                            <i data-feather="sun" id="theme-icon"></i>
                            <span id="theme-label">Light Mode</span>
                        </button>
                        <button id="layout-toggle" class="nav-item" role="menuitem" title="Toggle layout">
                            <i data-feather="grid" id="layout-icon"></i>
                            <span id="layout-label">Grid View</span>
                        </button>
                        <button id="refresh-btn" class="nav-item" role="menuitem" title="Refresh data">
                            <i data-feather="refresh-cw"></i>
                            <span>Refresh</span>
                        </button>
                        <button id="reports-btn" class="nav-item" role="menuitem" title="View reports">
                            <i data-feather="bar-chart-2"></i>
                            <span>Reports</span>
                        </button>
                        <button id="settings-btn" class="nav-item" role="menuitem" title="Settings">
                            <i data-feather="settings"></i>
                            <span>Settings</span>
                        </button>
                        <div class="export-dropdown-wrapper">
                            <button id="export-btn" class="nav-item" role="menuitem" title="Export dashboard">
                                <i data-feather="download"></i>
                                <span>Export</span>
                                <i data-feather="chevron-right" class="export-chevron"></i>
                            </button>
                            <div id="export-dropdown" class="export-dropdown" role="menu" aria-label="Export options">
                                <button class="export-option" id="export-json">
                                    <i data-feather="file-text"></i> Export as JSON
                                </button>
                                <button class="export-option" id="export-pdf">
                                    <i data-feather="printer"></i> Export as PDF
                                </button>
                                <button class="export-option" id="export-image">
                                    <i data-feather="image"></i> Export as Image
                                </button>
                            </div>
                        </div>
                        <div class="nav-divider"></div>
                        <a href="/ops" class="nav-item nav-item-devops" role="menuitem" title="DevOps Portal">
                            <i data-feather="tool"></i>
                            <span>DevOps Portal</span>
                        </a>
                    </nav>
                </div>
            </div>
        </header>
        
        <!-- Broadcast Banner (shown when ops team posts a message) -->
        <div id="broadcast-banner" class="broadcast-banner" style="display:none;">
            <div class="broadcast-inner">
                <i data-feather="alert-circle" class="broadcast-icon"></i>
                <span id="broadcast-message"></span>
                <span id="broadcast-meta" class="broadcast-meta"></span>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Filters Bar -->
            <div class="filters-bar" id="filters-bar">
                <!-- Row 1: All button + search + category buttons + view toggle -->
                <div class="filters-row filters-row-cats">
                    <div id="category-nav-all">
                        <!-- All button injected by JS -->
                    </div>
                    <div class="search-box">
                        <i data-feather="search"></i>
                        <input type="text" id="search-input" placeholder="Search services..." autocomplete="off">
                    </div>
                    <div class="category-nav" id="category-nav">
                        <!-- Category buttons injected by JS -->
                    </div>
                    <div class="filters-right">
                        <div class="view-options">
                            <button class="view-btn" data-view="columns" title="Columns view">
                                <i data-feather="columns"></i>
                            </button>
                            <button class="view-btn" data-view="grid" title="Grid view">
                                <i data-feather="grid"></i>
                            </button>
                            <button class="view-btn" data-view="table" title="Table view">
                                <i data-feather="list"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Row 2: Status filters (shown only when a category is active) -->
                <div class="filters-row filters-row-status" id="filters-row-status" style="display:none">
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">
                            All <span class="filter-count" id="count-all">0</span>
                        </button>
                        <button class="filter-btn" data-filter="healthy">
                            Healthy <span class="filter-count" id="count-healthy">0</span>
                        </button>
                        <button class="filter-btn" data-filter="warning">
                            Warnings <span class="filter-count" id="count-warning">0</span>
                        </button>
                        <button class="filter-btn" data-filter="critical">
                            Critical <span class="filter-count" id="count-critical">0</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Dashboard Content -->
            <div class="dashboard-wrapper">
                <div class="dashboard" id="dashboard">
                    <!-- Categories will be loaded here -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <!-- Settings Modal -->
        <div id="settings-modal" class="modal" style="display: none;">
            <div class="modal-header">
                <h3>Dashboard Settings</h3>
                <button class="modal-close" data-modal="settings">
                    <i data-feather="x"></i>
                </button>
            </div>
            <div class="modal-content">
                <!-- Settings content will be loaded here -->
            </div>
        </div>
        
        <!-- Reports Modal -->
        <div id="reports-modal" class="modal" style="display: none;">
            <div class="modal-header">
                <h3>Reports & Analytics</h3>
                <button class="modal-close" data-modal="reports">
                    <i data-feather="x"></i>
                </button>
            </div>
            <div class="modal-content">
                <!-- Reports content will be loaded here -->
            </div>
        </div>
        
        <!-- Service Details Modal -->
        <div id="service-modal" class="modal" style="display: none;">
            <div class="modal-header">
                <h3 id="service-modal-title">Service Details</h3>
                <button class="modal-close" data-modal="service">
                    <i data-feather="x"></i>
                </button>
            </div>
            <div class="modal-content" id="service-modal-content">
                <!-- Service details will be loaded here -->
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.29.0/dist/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="js/utils.js?v=7"></script>
    <script src="js/api.js?v=7"></script>
    <script src="js/components.js?v=7"></script>
    <script src="js/dashboard.js?v=8"></script>
    <script src="js/modals.js?v=7"></script>
    <script src="js/app.js?v=7"></script>
    
    <script>
        // Initialize feather icons
        feather.replace();
    </script>
</body>
</html>
